name: Basic Tests

on:
  push:
    branches: [ main, develop, sync-quality-threshold-modules, feature/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  basic-check:
    runs-on: ubuntu-latest
    name: Basic Health Check

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install tau2
      run: |
        pip install -e .

    - name: Test 1 - Import Check
      run: |
        python -c "
        import sys
        sys.path.insert(0, '.')

        # 测试基本导入
        import DataQualityFiltering
        print('[OK] DataQualityFiltering imported')

        import tau2
        print('[OK] tau2 imported')
        "

    - name: Test 2 - Tau2 Evaluators
      run: |
        python -c "
        from tau2.evaluator import ClinicalEvaluator
        print('[OK] ClinicalEvaluator imported')
        "

    - name: Test 3 - Data Quality
      run: |
        python -c "
        import sys
        sys.path.insert(0, '.')
        from DataQualityFiltering.data_quality import MedicalDialogueValidator
        validator = MedicalDialogueValidator()
        print('[OK] MedicalDialogueValidator works')
        "

    - name: Success
      run: |
        echo "All basic tests passed!"
        echo "[SUCCESS] Repository is healthy"
